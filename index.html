<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <title>Əhmədin Canlı Yayımı</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }
    h1 {
      margin-bottom: 20px;
      font-size: 32px;
    }
    h2 {
      margin-top: 40px;
      font-size: 24px;
      color: #00ffe1;
    }
    video {
      width: 90%;
      max-width: 800px;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>📺 Əhmədin Canlı Yayımı</h1>

  <h2>Nova Music</h2>
  <video id="novaMusic" controls autoplay muted></video>

  <h2>Nova Cinema</h2>
  <video id="novaCinema" controls autoplay muted></video>

  <p style="margin-top: 30px;">Əgər görüntü gəlmirsə, səhifəni yenilə.</p>

  <script>
    function playStream(videoId, streamUrl) {
      var video = document.getElementById(videoId);
      if (Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(streamUrl);
        hls.attachMedia(video);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = streamUrl;
      }
    }

    playStream('novaMusic', 'https://raw.githubusercontent.com/BY-KERIMOFF/ecanli/refs/heads/main/Nova-Music.m3u8');
    playStream('novaCinema', 'https://raw.githubusercontent.com/BY-KERIMOFF/ecanli/refs/heads/main/nova-cinema.m3u8');
  </script>
</body>
</html>
